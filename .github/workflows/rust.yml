name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false   # let all platforms run even if one fails
      matrix:
        include:
          - os: macos-latest
            label: macOS (Apple Silicon)

          # - os: macos-13
          #   label: macOS (Intel)

          - os: ubuntu-latest
            label: Linux (x86-64)

          - os: windows-latest
            label: Windows (x86-64)

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # ── libheif: platform-specific install ──────────────────────────────────

      - name: Install libheif (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install libheif
          echo "PKG_CONFIG_PATH=$(brew --prefix libheif)/lib/pkgconfig" >> $GITHUB_ENV

      - name: Install libheif (Linux — build from source)
        if: runner.os == 'Linux'
        run: |
          # Ubuntu apt only ships libheif 1.17; libheif-sys 5.x requires >= 1.21.
          # Build the required version from source.
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build pkg-config \
            libde265-dev libx265-dev libaom-dev \
            libpng-dev libjpeg-dev zlib1g-dev
 
          LIBHEIF_VERSION=1.21.0
          curl -fsSL \
            https://github.com/strukturag/libheif/releases/download/v${LIBHEIF_VERSION}/libheif-${LIBHEIF_VERSION}.tar.gz \
            | tar -xz
          cmake -S libheif-${LIBHEIF_VERSION} -B libheif-build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DWITH_EXAMPLES=OFF \
            -DWITH_TESTING=OFF
          ninja -C libheif-build
          sudo ninja -C libheif-build install
          sudo ldconfig
          echo "PKG_CONFIG_PATH=/usr/local/lib/pkgconfig" >> $GITHUB_ENV

      - name: Install libheif (Windows via vcpkg)
        if: runner.os == 'Windows'
        run: |
          vcpkg install libheif:x64-windows-static
          echo "VCPKG_ROOT=C:/vcpkg" >> $env:GITHUB_ENV
          echo "VCPKGRS_TRIPLET=x64-windows-static" >> $env:GITHUB_ENV
          echo "RUSTFLAGS=-C target-feature=+crt-static" >> $env:GITHUB_ENV

      # ── Rust toolchain + cache ───────────────────────────────────────────────

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # ── Build + test ─────────────────────────────────────────────────────────

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose

      - name: Build release-small
        run: cargo build --profile release-small
